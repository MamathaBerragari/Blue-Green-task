<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blue Green Demo App - Green</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #064e3b, #10b981, #d1fae5);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app-card {
      width: 560px;
      padding: 40px;
      border-radius: 24px;
      background: #ffffff;
      text-align: center;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.28);
      border-top: 12px solid #22c55e;
    }

    .badge {
      display: inline-block;
      padding: 9px 20px;
      border-radius: 30px;
      background: linear-gradient(90deg, #047857, #10b981, #6ee7b7);
      color: white;
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 10px 0;
      color: #1f2937;
      font-size: 31px;
    }

    h2 {
      margin: 5px 0 15px;
      color: #16a34a;
      font-size: 23px;
    }

    .description {
      color: #555;
      font-size: 16px;
      margin-bottom: 25px;
    }

    .new-feature {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      padding: 8px 15px;
      border-radius: 20px;
      font-weight: bold;
      margin-bottom: 15px;
      border: 1px solid #86efac;
    }

    .login-box {
      background: linear-gradient(135deg, #ecfdf5, #ffffff);
      padding: 28px;
      border-radius: 18px;
      margin-top: 20px;
      border: 1px solid #bbf7d0;
    }

    .form-row {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-weight: bold;
      color: #166534;
      margin-bottom: 8px;
      font-size: 15px;
    }

    input {
      width: 100%;
      padding: 14px 15px;
      border: 2px solid #bbf7d0;
      border-radius: 11px;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #16a34a;
      box-shadow: 0 0 10px rgba(22, 163, 74, 0.35);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #047857, #10b981, #6ee7b7);
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
    }

    .forgot-link {
      display: block;
      text-align: center;
      color: #047857;
      font-weight: bold;
      text-decoration: none;
      font-size: 15px;
      margin-top: 5px;
    }

    .forgot-link:hover {
      text-decoration: underline;
      color: #065f46;
    }

    .status {
      margin-top: 25px;
      padding: 13px;
      border-radius: 12px;
      background: #dcfce7;
      color: #166534;
      font-weight: bold;
      border: 1px solid #86efac;
    }

    .footer {
      margin-top: 18px;
      color: #6b7280;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="app-card">

    <div class="badge">GREEN ENVIRONMENT</div>

    <h1>Blue Green Demo Application</h1>
    <h2>Version 2 - New Release</h2>

    <div class="new-feature">
      New Feature Added: Forgot Password
    </div>

    <p class="description">
      This is the new application version deployed in the Green environment.
    </p>

    <div class="login-box">

      <div class="form-row">
        <label>Username :</label>
        <input type="text" placeholder="Enter your username">
      </div>

      <div class="form-row">
        <label>Password :</label>
        <input type="password" placeholder="Enter your password">
      </div>

      <div class="form-row">
        <button class="login-btn">Login</button>
      </div>

      <div class="form-row">
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>

    </div>

    <p class="status">
      Traffic is currently serving from GREEN instance.
    </p>

    <p class="footer">
      Classic Blue-Green Deployment Demo
    </p>

  </div>

</body>
</html>
